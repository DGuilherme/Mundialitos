<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNDIALITO PADEL 2026 - CALENDÁRIO OFICIAL</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="page-header">
        <div id="admin-bar"></div>
        <h1>MUNDIALITO PADEL 2026</h1>
        <p>CALENDÁRIO OFICIAL &bull; 48 EQUIPAS &bull; 12 GRUPOS &bull; ESCOLHA A SUA VAGA</p>
    </div>

    <div class="club-container">
        <div class="club-label">CESARPADEL (CAMPOS 1-3)</div>
        <div class="grid" id="grid-a"></div>
    </div>

    <div class="club-container">
        <div class="club-label">KINHAS SPORT (CAMPOS 4-6)</div>
        <div class="grid" id="grid-b"></div>
    </div>

    <div class="phases-section">
        <div class="phases-title">FASES ELIMINATÓRIAS</div>
        <div class="phase-tabs" id="phaseTabs">
            <button class="phase-tab active" data-target="phase-knockout">16AVOS &amp; 8AVOS</button>
            <button class="phase-tab" data-target="phase-semis">MEIAS FINAIS</button>
            <button class="phase-tab" data-target="phase-final">FINAL</button>
        </div>
        <div class="phase-panels">
            <div class="phase-panel active" id="phase-knockout">
                <div class="phase-dates">18 — 24 JULHO</div>
                <div class="phase-desc">16 Avos e Oitavos de Final &bull; Sextas e Sábados</div>
            </div>
            <div class="phase-panel" id="phase-semis">
                <div class="phase-dates">25 — 30 JULHO</div>
                <div class="phase-desc">Meias Finais &bull; Sextas e Sábados</div>
            </div>
            <div class="phase-panel" id="phase-final">
                <div class="phase-dates">1 AGOSTO</div>
                <div class="phase-desc">Grande Final</div>
            </div>
        </div>
    </div>

    <script src="js/main.js" type="module"></script>
    <script>
        document.getElementById('phaseTabs').addEventListener('click', function(e) {
            var tab = e.target.closest('.phase-tab');
            if (!tab) return;
            document.querySelectorAll('.phase-tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.phase-panel').forEach(function(p) { p.classList.remove('active'); });
            tab.classList.add('active');
            document.getElementById(tab.dataset.target).classList.add('active');
        });
    </script>
</body>
</html>
